<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Window 3D Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#050508}
        body{font-family:'Space Mono',monospace}
        canvas{display:block;position:fixed;top:0;left:0}

        .ui{position:fixed;color:rgba(255,255,255,.5);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;pointer-events:none;z-index:10;transition:color 1.2s ease}
        #label{top:22px;left:26px;font-weight:700;font-size:11px;letter-spacing:3px}
        #count{top:22px;right:26px;color:rgba(255,255,255,.18);font-size:9px;letter-spacing:2px}
        #hint{bottom:26px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.18);font-size:9px;letter-spacing:1.8px;white-space:nowrap;transition:opacity 2.5s ease;text-align:center;line-height:1.6}

        .c{position:fixed;width:26px;height:26px;pointer-events:none;z-index:10;transition:border-color 1.2s ease}
        .c-tl{top:12px;left:12px;border-top:1px solid rgba(255,255,255,.08);border-left:1px solid rgba(255,255,255,.08)}
        .c-tr{top:12px;right:12px;border-top:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08)}
        .c-bl{bottom:12px;left:12px;border-bottom:1px solid rgba(255,255,255,.08);border-left:1px solid rgba(255,255,255,.08)}
        .c-br{bottom:12px;right:12px;border-bottom:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08)}

        #vig{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.8) 100%)}
        #scanline{position:fixed;inset:0;pointer-events:none;z-index:6;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);opacity:.3}
    </style>
</head>
<body>
    <div id="vig"></div>
    <div id="scanline"></div>
    <div id="label" class="ui">Window 01</div>
    <div id="count" class="ui">1 Connected</div>
    <div id="hint" class="ui">Pəncərələri üst-üstə və ya yan-yana qoyun<br>&middot; Hər iki pəncərənin arxa planda da sinxron işlədiyini izləyin &middot;</div>
    <div class="c c-tl"></div>
    <div class="c c-tr"></div>
    <div class="c c-bl"></div>
    <div class="c c-br"></div>

    <script type="importmap">
    {
        "imports":{
            "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    /* ===========================================
       Rəng Palitrası — hər pəncərəyə fərqli rəng
    =========================================== */
    const PALETTE = [
        new THREE.Color(0x00ffaa),   // Neon Yaşıl
        new THREE.Color(0xff3366),   // Neon Çəhrayı/Qırmızı
        new THREE.Color(0x00d2ff),   // Neon Mavi
        new THREE.Color(0xff9900),   // Narıncı
        new THREE.Color(0xbd00ff),   // Bənövşəyi
    ];

    const SPHERE_N     = 30; 
    const CONN_DIST    = 3.5;
    const PARTICLE_N   = 400;

    /* Ekran koordinatlarını 3D fəzaya çevirmək üçün miqyas (Scale) */
    const PIXEL_TO_3D  = 0.0095; 

    /* ===========================================
       Pəncərə İdentifikasiyası və Sinxronizasiya
    =========================================== */
    const winId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
    let channel;
    try { channel = new BroadcastChannel('mw3d-scene'); } catch(e) { channel = null; }

    const remoteWins = {};
    let winIdx = 0;
    let gMouse = { x: 0, y: 0 };
    let hasInput = false;
    let autoAng = 0;

    // Cari pəncərənin son bilinən mövqeyi
    let lastScreenX = window.screenX;
    let lastScreenY = window.screenY;

    function bcastWin() {
        if (!channel) return;
        channel.postMessage({
            t: 'w', id: winId,
            sx: window.screenX, sy: window.screenY,
            sw: window.innerWidth, sh: window.innerHeight,
            ts: Date.now()
        });
    }

    if (channel) {
        channel.onmessage = (e) => {
            const d = e.data;
            if (d.t === 'w') {
                remoteWins[d.id] = { sx: d.sx, sy: d.sy, sw: d.sw, sh: d.sh, ts: d.ts };
                rebuildIndex();
            } else if (d.t === 'm') {
                hasInput = true;
                gMouse.x = d.mx;
                gMouse.y = d.my;
            } else if (d.t === 'x') {
                delete remoteWins[d.id];
                rebuildIndex();
            }
        };
    }

    remoteWins[winId] = { sx: window.screenX, sy: window.screenY, sw: window.innerWidth, sh: window.innerHeight, ts: Date.now() };

    function rebuildIndex() {
        const sorted = Object.entries(remoteWins).sort((a, b) =>
            a[1].sx - b[1].sx || a[1].sy - b[1].sy || a[0].localeCompare(b[0])
        );
        const idx = sorted.findIndex(([id]) => id === winId);
        if (idx !== -1) winIdx = idx;
        tgtColor.set(PALETTE[winIdx % PALETTE.length]);
        refreshUI();
    }

    function refreshUI() {
        const total = Object.keys(remoteWins).length;
        const num = String(winIdx + 1).padStart(2, '0');
        const hex = '#' + tgtColor.getHexString();

        document.getElementById('label').textContent = 'Window ' + num;
        document.getElementById('label').style.color = hex + 'cc';
        document.getElementById('count').textContent = total + ' Connected';

        document.querySelectorAll('.c').forEach(el => {
            el.style.borderColor = hex + '22';
        });
    }

    // Passiv və bağlanmış pəncərələri təmizlə
    setInterval(() => {
        const now = Date.now();
        Object.keys(remoteWins).forEach(k => {
            if (k !== winId && now - remoteWins[k].ts > 4000) delete remoteWins[k];
        });
        rebuildIndex();
    }, 1500);

    /* ===========================================
       Three.js Sazlamaları
    =========================================== */
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050508, 0.04);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    /* Post-Processing (Glow/Bloom Effekti) */
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloom = new UnrealBloomPass(
        new THREE.Vector2(innerWidth, innerHeight),
        1.6,   
        0.4,   
        0.1    
    );
    composer.addPass(bloom);

    /* İşıqlandırma */
    scene.add(new THREE.AmbientLight(0x0f0f15));

    const keyLight = new THREE.PointLight(0xffffff, 3.5, 50);
    keyLight.position.set(0, 5, 10);
    scene.add(keyLight);

    const rimLight = new THREE.PointLight(PALETTE[0], 3, 30);
    rimLight.position.set(-8, -5, 5);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(PALETTE[0], 1.5, 30);
    fillLight.position.set(8, 5, 5);
    scene.add(fillLight);

    /* ===========================================
       Obyektlər (Qlobal Fəzada Sabit Qalan Küreler)
    =========================================== */
    let curColor = new THREE.Color(PALETTE[0]);
    let tgtColor = new THREE.Color(PALETTE[0]);

    const spheres = [];
    const sData = [];

    for (let i = 0; i < SPHERE_N; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        const r     = 1.5 + Math.random() * 4.5; 

        const base = new THREE.Vector3(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta) * 0.8,
            r * Math.cos(phi) * 0.8
        );

        const sz = 0.15 + Math.random() * 0.4;
        const geo = new THREE.SphereGeometry(sz, 32, 32);
        const mat = new THREE.MeshStandardMaterial({
            color: PALETTE[0],
            emissive: PALETTE[0],
            emissiveIntensity: 0.6,
            metalness: 0.8,
            roughness: 0.1,
        });

        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(base);
        scene.add(mesh);
        spheres.push(mesh);

        sData.push({
            base: base.clone(),
            spd: 0.3 + Math.random() * 0.6,
            ph: Math.random() * Math.PI * 2,
            ax: 0.2 + Math.random() * 0.4,
            ay: 0.15 + Math.random() * 0.3,
            az: 0.1 + Math.random() * 0.2,
            emBase: 0.4 + (sz / 0.5) * 0.4,
        });
    }

    /* Bağlayıcı Xətlər */
    const maxLV = SPHERE_N * (SPHERE_N - 1);
    const lArr = new Float32Array(maxLV * 3);
    const lGeo = new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.BufferAttribute(lArr, 3));
    lGeo.setDrawRange(0, 0);

    const lMat = new THREE.LineBasicMaterial({
        color: PALETTE[0],
        transparent: true,
        opacity: 0.15,
        linewidth: 1.5
    });
    const lineMesh = new THREE.LineSegments(lGeo, lMat);
    scene.add(lineMesh);

    function rebuildLines() {
        let n = 0;
        const a = lGeo.attributes.position.array;
        for (let i = 0; i < SPHERE_N; i++) {
            for (let j = i + 1; j < SPHERE_N; j++) {
                const d = spheres[i].position.distanceTo(spheres[j].position);
                if (d < CONN_DIST) {
                    const o = n * 6;
                    a[o]   = spheres[i].position.x;
                    a[o+1] = spheres[i].position.y;
                    a[o+2] = spheres[i].position.z;
                    a[o+3] = spheres[j].position.x;
                    a[o+4] = spheres[j].position.y;
                    a[o+5] = spheres[j].position.z;
                    n++;
                }
            }
        }
        lGeo.setDrawRange(0, n * 2);
        lGeo.attributes.position.needsUpdate = true;
    }

    /* Arxa Fon Hissəcikləri */
    const pGeo = new THREE.BufferGeometry();
    const pA = new Float32Array(PARTICLE_N * 3);
    const pSpd = new Float32Array(PARTICLE_N);
    const pOff = new Float32Array(PARTICLE_N);

    for (let i = 0; i < PARTICLE_N; i++) {
        pA[i*3]   = (Math.random() - 0.5) * 40;
        pA[i*3+1] = (Math.random() - 0.5) * 30;
        pA[i*3+2] = (Math.random() - 0.5) * 20;
        pSpd[i] = 0.004 + Math.random() * 0.008;
        pOff[i] = Math.random() * Math.PI * 2;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pA, 3));

    const pMat = new THREE.PointsMaterial({
        color: PALETTE[0],
        size: 0.03,
        transparent: true,
        opacity: 0.4,
        sizeAttenuation: true,
    });
    const particleSystem = new THREE.Points(pGeo, pMat);
    scene.add(particleSystem);

    /* ===========================================
       İnteraktiv Hadisələr
    =========================================== */
    window.addEventListener('mousemove', (e) => {
        const mx = (e.clientX / innerWidth) * 2 - 1;
        const my = -(e.clientY / innerHeight) * 2 + 1;
        gMouse.x = mx;
        gMouse.y = my;
        hasInput = true;
        if (channel) channel.postMessage({ t: 'm', mx, my });
    });

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
        bloom.resolution.set(innerWidth, innerHeight);
        bcastWin();
    });

    window.addEventListener('beforeunload', () => {
        if (channel) {
            channel.postMessage({ t: 'x', id: winId });
            channel.close();
        }
    });

    /* ===========================================
       Animasiya və Portal Hesablaması
    =========================================== */
    const clock = new THREE.Clock();

    function updatePhysicsAndRender() {
        const t = clock.getElapsedTime();

        /* 1. REAL ZAMANLI MÖVQE İZLƏMƏ */
        if (window.screenX !== lastScreenX || window.screenY !== lastScreenY) {
            lastScreenX = window.screenX;
            lastScreenY = window.screenY;
            bcastWin();
            remoteWins[winId].sx = window.screenX;
            remoteWins[winId].sy = window.screenY;
        }

        /* 2. KAMERANIN PORTAL MÖVQEYİNİN DƏQİQ SİNXRONİZASIYASI */
        // Bütün pəncərələr üçün vahid ekran mərkəz nöqtəsi (virtual sıfır nöqtəsi)
        const screenCenterX = window.screen.availWidth / 2;
        const screenCenterY = window.screen.availHeight / 2;

        // Bu pəncərənin mərkəzi
        const winCenterX = window.screenX + window.innerWidth / 2;
        const winCenterY = window.screenY + window.innerHeight / 2;

        const dx = winCenterX - screenCenterX;
        const dy = winCenterY - screenCenterY;

        // 3D fəzada kameranın koordinatları birbaşa pəncərənin ekrandakı yerinə əsasən hesablanır
        const targetCamX = dx * PIXEL_TO_3D;
        const targetCamY = -dy * PIXEL_TO_3D; 

        // Rəvan keçid, pəncərələr üst-üstə gəldikdə dəqiq eyni koordinata oturmalarını təmin edir
        camera.position.x += (targetCamX - camera.position.x) * 0.3;
        camera.position.y += (targetCamY - camera.position.y) * 0.3;
        camera.position.z = 11; 

        // Hər iki pəncərənin eyni istiqamətə (eyni qlobal baxış açısına) baxmasını təmin edirik
        camera.lookAt(camera.position.x, camera.position.y, 0);

        /* 3. PARALLAX SİNXRONİZASIYASI */
        if (!hasInput) {
            autoAng += 0.005;
            gMouse.x = Math.sin(autoAng) * 0.4;
            gMouse.y = Math.cos(autoAng * 0.7) * 0.25;
        }

        scene.position.x += (gMouse.x * 1.5 - scene.position.x) * 0.05;
        scene.position.y += (gMouse.y * 1.0 - scene.position.y) * 0.05;

        /* Rəng keçidi */
        curColor.lerp(tgtColor, 0.03);

        /* Kürelerin animasiyası */
        for (let i = 0; i < SPHERE_N; i++) {
            const s = spheres[i];
            const d = sData[i];

            s.position.x = d.base.x + Math.sin(t * d.spd + d.ph) * d.ax;
            s.position.y = d.base.y + Math.cos(t * d.spd * 0.8 + d.ph) * d.ay;
            s.position.z = d.base.z + Math.sin(t * d.spd * 0.5 + d.ph * 1.2) * d.az;

            s.material.color.copy(curColor);
            s.material.emissive.copy(curColor);
            s.material.emissiveIntensity = d.emBase + Math.sin(t * 2.0 + d.ph) * 0.2;
        }

        /* Xətlərin yenilənməsi */
        rebuildLines();
        lMat.color.copy(curColor);

        /* Hissəciklər */
        const pp = pGeo.attributes.position.array;
        for (let i = 0; i < PARTICLE_N; i++) {
            pp[i*3+1] += pSpd[i];
            pp[i*3]   += Math.sin(t * 0.3 + pOff[i]) * 0.001;
            if (pp[i*3+1] > 15) {
                pp[i*3+1] = -15;
                pp[i*3]   = (Math.random() - 0.5) * 40;
                pp[i*3+2] = (Math.random() - 0.5) * 20;
            }
        }
        pGeo.attributes.position.needsUpdate = true;
        pMat.color.copy(curColor);

        /* İşıqlar */
        keyLight.position.x = camera.position.x + gMouse.x * 4;
        keyLight.position.y = camera.position.y + gMouse.y * 3 + 4;
        rimLight.color.copy(curColor);
        fillLight.color.copy(curColor).multiplyScalar(0.4);

        /* Render */
        composer.render();
    }

    // Əsas animasiya döngüsü
    function animate() {
        requestAnimationFrame(animate);
        updatePhysicsAndRender();
    }

    // Brauzer tabı arxa plana keçdikdə dondurulmanın qarşısını alan ehtiyat Taymer döngüsü
    setInterval(() => {
        if (document.hidden) {
            updatePhysicsAndRender();
        }
    }, 1000 / 30); // Arxa planda olarkən saniyədə 30 kadrla yeniləməyə davam edir

    /* ===========================================
       Başlatma və İlkin Sazlama
    =========================================== */
    bcastWin();
    setInterval(bcastWin, 250); // Məlumat ötürmə tezliyi artırıldı (daha hamar sinxronizasiya üçün)
    rebuildIndex();
    animate();

    setTimeout(() => {
        document.getElementById('hint').style.opacity = '0.08';
    }, 7000);

    </script>
</body>
</html>
