<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zərrəcik AR: Canlı və Real Dünya</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #video-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="input_video" style="display:none"></video>
    <canvas id="video-canvas"></canvas>
    <canvas id="three-canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const videoCanvas = document.getElementById('video-canvas');
        const videoCtx = videoCanvas.getContext('2d');

        // --- YÜKSƏK KEYFİYYƏTLİ DÜNYA DATA ANALİZİ ---
        const mapCanvas = document.createElement('canvas');
        const mapCtx = mapCanvas.getContext('2d');
        const mapImg = new Image();
        mapImg.crossOrigin = "anonymous";
        // Daha dəqiq qitə və okean ayrımı üçün xəritə
        mapImg.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Blue_Marble_2002.png/1024px-Blue_Marble_2002.png";
        
        let mapData = null;
        mapImg.onload = () => {
            mapCanvas.width = 1024;
            mapCanvas.height = 512;
            mapCtx.drawImage(mapImg, 0, 0, 1024, 512);
            mapData = mapCtx.getImageData(0, 0, 1024, 512).data;
        };

        // --- THREE.JS QURULUMU ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('three-canvas'), 
            alpha: true, 
            antialias: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // --- ZƏRRƏCİKLƏR SİSTEMİ ---
        const particleCount = 40000; 
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const randomSource = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorCyan = new THREE.Color(0x00f2ff);

        for (let i = 0; i < particleCount; i++) {
            const r = 35 + Math.random() * 20;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            randomSource[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            randomSource[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            randomSource[i * 3 + 2] = r * Math.cos(phi);

            positions[i * 3] = randomSource[i * 3];
            positions[i * 3 + 1] = randomSource[i * 3 + 1];
            positions[i * 3 + 2] = randomSource[i * 3 + 2];

            colors[i * 3] = colorCyan.r;
            colors[i * 3 + 1] = colorCyan.g;
            colors[i * 3 + 2] = colorCyan.b;
        }

        const particleGeometry = new THREE.BufferGeometry();
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.03, 
            vertexColors: true,
            transparent: true,
            opacity: 1.0,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        camera.position.z = 9;

        let mode = "hidden";
        let rotationY = 0;
        let rotationX = 0;

        function getRealWorldCoords(i) {
            // Fibonacci Sphere paylanması
            const phi = Math.acos(-1 + (2 * i) / particleCount);
            const theta = Math.sqrt(particleCount * Math.PI) * phi;

            const u = ((theta % (Math.PI * 2)) / (Math.PI * 2));
            const v = (phi / Math.PI);

            const x_map = Math.floor(u * 1023);
            const y_map = Math.floor(v * 511);
            
            let r = 4.2;
            let targetColor = new THREE.Color();

            if (mapData) {
                const idx = (y_map * 1024 + x_map) * 4;
                const r_val = mapData[idx];
                const g_val = mapData[idx + 1];
                const b_val = mapData[idx + 2];
                
                // Quru və Okean rəng ayrımı
                const isLand = g_val > b_val - 10 && g_val > 45;
                
                if (isLand) {
                    r = 4.4; // Qurunu daha da qabarıq (bəlirgin) edirik
                    // Canlı yaşıl rəng tonları
                    targetColor.setRGB(0.1, 0.9, 0.2); 
                } else {
                    r = 4.2;
                    // Dərin mavi okean rəngi
                    targetColor.setRGB(0.0, 0.3, 1.0);
                }
            }

            return {
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.cos(phi),
                z: r * Math.sin(phi) * Math.sin(theta),
                color: targetColor
            };
        }

        function updateTargetPositions() {
            const colorAttr = particleSystem.geometry.attributes.color;
            for (let i = 0; i < particleCount; i++) {
                let tx, ty, tz;
                let targetColor = colorCyan;

                if (mode === "hidden") {
                    tx = randomSource[i * 3]; ty = randomSource[i * 3 + 1]; tz = randomSource[i * 3 + 2];
                } else if (mode === "line") {
                    tx = (Math.random() - 0.5) * 8; ty = (Math.random() - 0.5) * 0.05; tz = (Math.random() - 0.5) * 0.05;
                } else if (mode === "cube") {
                    tx = (Math.random() - 0.5) * 5.0; ty = (Math.random() - 0.5) * 5.0; tz = (Math.random() - 0.5) * 5.0;
                } else if (mode === "sphere") {
                    const radius = 4.0;
                    const p = Math.acos(-1 + (2 * i) / particleCount);
                    const t = Math.sqrt(particleCount * Math.PI) * p;
                    tx = radius * Math.sin(p) * Math.cos(t); ty = radius * Math.cos(p); tz = radius * Math.sin(p) * Math.sin(t);
                } else if (mode === "earth") {
                    const coords = getRealWorldCoords(i);
                    tx = coords.x; ty = coords.y; tz = coords.z;
                    targetColor = coords.color;
                }

                targetPositions[i * 3] = tx;
                targetPositions[i * 3 + 1] = ty;
                targetPositions[i * 3 + 2] = tz;

                colorAttr.array[i * 3] = targetColor.r;
                colorAttr.array[i * 3 + 1] = targetColor.g;
                colorAttr.array[i * 3 + 2] = targetColor.b;
            }
            colorAttr.needsUpdate = true;
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });

        function onResults(results) {
            videoCanvas.width = window.innerWidth;
            videoCanvas.height = window.innerHeight;
            videoCtx.save();
            videoCtx.drawImage(results.image, 0, 0, videoCanvas.width, videoCanvas.height);
            videoCtx.restore();

            let rOpen = false, lOpen = false, rVis = false, lVis = false;
            const pThr = 0.12, fThr = 0.28;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, idx) => {
                    const label = results.multiHandedness[idx].label;
                    const d = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
                    if (label === "Left") { 
                        rVis = true; rOpen = d > pThr; window.rFull = d > fThr;
                        rotationY = ((1 - landmarks[0].x) - 0.5) * 10;
                        rotationX = (landmarks[0].y - 0.5) * 10;
                    } else { 
                        lVis = true; lOpen = d > pThr; window.lFull = d > fThr;
                    }
                });
            }

            let lastMode = mode;
            if (rVis && lVis) {
                if (window.rFull && window.lFull) mode = "sphere";
                else if (rOpen && lOpen) mode = "cube";
                else mode = "earth";
            } else if (rVis) {
                mode = rOpen ? "line" : "earth";
            } else mode = "hidden";

            if (lastMode !== mode) updateTargetPositions();
        }

        hands.onResults(onResults);
        const cameraFeed = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
        cameraFeed.start();

        function animate() {
            requestAnimationFrame(animate);
            const posArray = particleSystem.geometry.attributes.position.array;
            const lerpSpeed = (mode === "earth") ? 0.05 : 0.08;
            for (let i = 0; i < particleCount * 3; i++) posArray[i] += (targetPositions[i] - posArray[i]) * lerpSpeed;
            particleSystem.geometry.attributes.position.needsUpdate = true;

            if (mode !== "hidden") {
                particleSystem.rotation.y += (rotationY - particleSystem.rotation.y) * 0.1;
                particleSystem.rotation.x += (rotationX - particleSystem.rotation.x) * 0.1;
                if(mode === "earth") {
                    particleSystem.rotation.y += 0.003; // Dünya rejimində yavaş fırlanma
                } else {
                    particleSystem.rotation.z += 0.005;
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = () => { updateTargetPositions(); animate(); };
    </script>
</body>
</html>
