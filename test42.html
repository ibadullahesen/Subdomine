<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qızılı Saturn - İnteraktiv Toz Zərrəcikləri</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #input-video { display: none; }

        #loading-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 1.4rem; text-align: center; pointer-events: none;
            z-index: 10; text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            letter-spacing: 2px;
        }
        #loading-msg small {
            display: block; margin-top: 12px; font-size: 0.85rem;
            color: #b8860b; letter-spacing: 1px;
        }

        #hint-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255, 215, 0, 0.5); font-size: 0.8rem; text-align: center;
            pointer-events: none; z-index: 10; letter-spacing: 1px;
            transition: opacity 1.5s ease;
        }

        /* Kənarlarda incə qızılı çərçivə parıltısı */
        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
            box-shadow: inset 0 0 150px rgba(255, 180, 0, 0.03);
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="loading-msg">Qızılı Saturn Yüklənir...<br><small>Kameraya icazə verin</small></div>
    <div id="hint-overlay">Müştülə — fırlat &nbsp;|&nbsp; Açiq əl — partlad &nbsp;|&nbsp; Baş barmaq+şəhadət — yaxınlaşdır</div>
    <video id="input-video" playsinline></video>

    <script>
        let scene, camera, renderer, saturn, rings, stars;
        let nebulaParticles;
        let handGroup, handSkeleton, handPoints;
        let lastHandPos = null;
        let currentHandCenter = new THREE.Vector3(0, 0, 0);
        let isExploded = false;
        let explosionFactor = 0;
        let shakeIntensity = 0;
        let clock = new THREE.Clock();

        let saturnOrigPos = [];
        let ringOrigPos = [];
        let saturnRandomDirs = [];
        let ringRandomDirs = [];

        function initThree() {
            scene = new THREE.Scene();
            // Fon rəngi dərin qara, bir az isti
            scene.background = new THREE.Color(0x020100);
            scene.fog = new THREE.FogExp2(0x020100, 0.003);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 12;
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // ========================
            // SATURN — Qızılı Toz Kürəsi
            // ========================
            const saturnGeo = new THREE.SphereGeometry(4, 80, 80);
            const saturnMat = new THREE.PointsMaterial({
                color: 0xffd700,
                size: 0.045,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            saturn = new THREE.Points(saturnGeo, saturnMat);
            scene.add(saturn);

            const sPos = saturn.geometry.attributes.position.array;
            for (let i = 0; i < sPos.length; i += 3) {
                saturnOrigPos.push(sPos[i], sPos[i + 1], sPos[i + 2]);
                saturnRandomDirs.push(
                    (Math.random() - 0.5) * 3.5,
                    (Math.random() - 0.5) * 3.5,
                    (Math.random() - 0.5) * 3.5
                );
            }

            // Saturnun içinə daha kiçik, daha parlaq nüvə hissəcikləri
            const coreGeo = new THREE.SphereGeometry(2.2, 40, 40);
            const coreMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.03,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const core = new THREE.Points(coreGeo, coreMat);
            saturn.add(core);

            // ========================
            // HALQALAR — Çoxqatlı qızılı halqalar
            // ========================
            rings = new THREE.Group();
            scene.add(rings);

            const ringLayers = [
                { count: 6000, rMin: 5.8, rMax: 7.0, color: 0xdaa520, size: 0.02, opacity: 0.5, ySpread: 0.08 },
                { count: 8000, rMin: 7.1, rMax: 8.5, color: 0xffd700, size: 0.03, opacity: 0.7, ySpread: 0.12 },
                { count: 4000, rMin: 8.6, rMax: 9.2, color: 0xffec8b, size: 0.025, opacity: 0.4, ySpread: 0.06 },
                { count: 3000, rMin: 9.4, rMax: 10.2, color: 0xcd853f, size: 0.02, opacity: 0.35, ySpread: 0.1 }
            ];

            ringLayers.forEach(layer => {
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(layer.count * 3);
                for (let i = 0; i < layer.count; i++) {
                    const r = layer.rMin + Math.random() * (layer.rMax - layer.rMin);
                    const a = Math.random() * Math.PI * 2;
                    const x = Math.cos(a) * r;
                    const y = (Math.random() - 0.5) * layer.ySpread;
                    const z = Math.sin(a) * r;
                    pos[i * 3] = x;
                    pos[i * 3 + 1] = y;
                    pos[i * 3 + 2] = z;
                    ringOrigPos.push(x, y, z);
                    ringRandomDirs.push(
                        (Math.random() - 0.5) * 2.5,
                        (Math.random() - 0.5) * 2.5,
                        (Math.random() - 0.5) * 2.5
                    );
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({
                    color: layer.color,
                    size: layer.size,
                    transparent: true,
                    opacity: layer.opacity,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                rings.add(new THREE.Points(geo, mat));
            });

            rings.rotation.x = Math.PI / 3.2;

            // ========================
            // ULDUZLAR — Arxa plan
            // ========================
            const starGeo = new THREE.BufferGeometry();
            const starCount = 6000;
            const starPos = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPos[i * 3] = (Math.random() - 0.5) * 1200;
                starPos[i * 3 + 1] = (Math.random() - 0.5) * 1200;
                starPos[i * 3 + 2] = (Math.random() - 0.5) * 1200;
                // Ulduzlar: ağ, açıq mavi, açıq sarı
                const temp = Math.random();
                if (temp < 0.6) {
                    starColors[i * 3] = 1; starColors[i * 3 + 1] = 1; starColors[i * 3 + 2] = 1;
                } else if (temp < 0.8) {
                    starColors[i * 3] = 0.7; starColors[i * 3 + 1] = 0.8; starColors[i * 3 + 2] = 1;
                } else {
                    starColors[i * 3] = 1; starColors[i * 3 + 1] = 0.95; starColors[i * 3 + 2] = 0.7;
                }
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({
                size: 0.5, vertexColors: true, transparent: true, opacity: 0.8,
                blending: THREE.AdditiveBlending, depthWrite: false
            }));
            scene.add(stars);

            // ========================
            // NEBULA — Arxa plan dumanlıqları
            // ========================
            const nebulaGeo = new THREE.BufferGeometry();
            const nebulaCount = 800;
            const nebPos = new Float32Array(nebulaCount * 3);
            for (let i = 0; i < nebulaCount; i++) {
                nebPos[i * 3] = (Math.random() - 0.5) * 400;
                nebPos[i * 3 + 1] = (Math.random() - 0.5) * 400;
                nebPos[i * 3 + 2] = -200 - Math.random() * 300;
            }
            nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebPos, 3));
            nebulaParticles = new THREE.Points(nebulaGeo, new THREE.PointsMaterial({
                color: 0x4a2000,
                size: 8,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            }));
            scene.add(nebulaParticles);

            // ========================
            // ƏL SKELETİ
            // ========================
            handGroup = new THREE.Group();
            const skeletonGeo = new THREE.BufferGeometry();
            const skeletonMat = new THREE.LineBasicMaterial({
                color: 0xffd700,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            handSkeleton = new THREE.LineSegments(skeletonGeo, skeletonMat);

            const pointsGeo = new THREE.BufferGeometry();
            const pointsMat = new THREE.PointsMaterial({
                color: 0xffec8b,
                size: 0.12,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            handPoints = new THREE.Points(pointsGeo, pointsMat);
            handGroup.add(handSkeleton);
            handGroup.add(handPoints);
            handGroup.position.set(0, 0, -10);
            camera.add(handGroup);

            // İşıqlandırma
            scene.add(new THREE.AmbientLight(0xffd700, 0.3));

            // Mərkəzi nöqtəli işıq (Saturnu qızıl üzə verir)
            const pointLight = new THREE.PointLight(0xffa500, 2, 50);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            animate();
        }

        function isHandFist(landmarks) {
            const tips = [8, 12, 16, 20];
            const joints = [6, 10, 14, 18];
            let closedCount = 0;
            for (let i = 0; i < 4; i++) {
                if (landmarks[tips[i]].y > landmarks[joints[i]].y) closedCount++;
            }
            return closedCount >= 3;
        }

        function updateExplosion(time) {
            if (!saturn || !rings) return;
            const saturnAttr = saturn.geometry.attributes.position;

            const targetFactor = isExploded ? 8.0 : 0;
            explosionFactor = THREE.MathUtils.lerp(explosionFactor, targetFactor, isExploded ? 0.04 : 0.18);

            let attractionVector = new THREE.Vector3();
            if (isExploded) {
                attractionVector.copy(currentHandCenter);
                handGroup.localToWorld(attractionVector);
            }

            // Saturn hissəcikləri — partlayış + cəlb olunma + minimal titreşim
            for (let i = 0; i < saturnAttr.count; i++) {
                const i3 = i * 3;
                let x = saturnOrigPos[i3] + saturnRandomDirs[i3] * explosionFactor;
                let y = saturnOrigPos[i3 + 1] + saturnRandomDirs[i3 + 1] * explosionFactor;
                let z = saturnOrigPos[i3 + 2] + saturnRandomDirs[i3 + 2] * explosionFactor;

                if (isExploded) {
                    x = THREE.MathUtils.lerp(x, attractionVector.x, 0.08);
                    y = THREE.MathUtils.lerp(y, attractionVector.y, 0.08);
                    z = THREE.MathUtils.lerp(z, attractionVector.z, 0.08);
                }

                // Sakit halda da kiçik "nəfəs" effekti
                if (!isExploded) {
                    const breathe = Math.sin(time * 0.8 + i * 0.01) * 0.015;
                    x += saturnOrigPos[i3] * breathe;
                    y += saturnOrigPos[i3 + 1] * breathe;
                    z += saturnOrigPos[i3 + 2] * breathe;
                }

                saturnAttr.array[i3] = x;
                saturnAttr.array[i3 + 1] = y;
                saturnAttr.array[i3 + 2] = z;
            }
            saturnAttr.needsUpdate = true;

            // Halqa hissəcikləri
            rings.children.forEach((ringMesh, layerIdx) => {
                const rAttr = ringMesh.geometry.attributes.position;
                const layerOffset = layerIdx > 0 ?
                    [6000, 14000, 18000, 21000][layerIdx - 1] || 0 : 0;
                // Hər bir qatın başlanğıc indeksini hesablayaq
                let startIdx = 0;
                for (let l = 0; l < layerIdx; l++) {
                    startIdx += [6000, 8000, 4000, 3000][l];
                }

                for (let i = 0; i < rAttr.count; i++) {
                    const gi = (startIdx + i) * 3;
                    let x = ringOrigPos[gi] + ringRandomDirs[gi] * explosionFactor;
                    let y = ringOrigPos[gi + 1] + ringRandomDirs[gi + 1] * explosionFactor;
                    let z = ringOrigPos[gi + 2] + ringRandomDirs[gi + 2] * explosionFactor;

                    if (isExploded) {
                        x = THREE.MathUtils.lerp(x, attractionVector.x, 0.06);
                        y = THREE.MathUtils.lerp(y, attractionVector.y, 0.06);
                        z = THREE.MathUtils.lerp(z, attractionVector.z, 0.06);
                    }

                    // Halqa hissəciklərinə də nəfəs effekti
                    if (!isExploded) {
                        const breathe = Math.sin(time * 0.6 + i * 0.005 + layerIdx) * 0.008;
                        x += ringOrigPos[gi] * breathe;
                        y += ringOrigPos[gi + 1] * breathe;
                        z += ringOrigPos[gi + 2] * breathe;
                    }

                    rAttr.array[i * 3] = x;
                    rAttr.array[i * 3 + 1] = y;
                    rAttr.array[i * 3 + 2] = z;
                }
                rAttr.needsUpdate = true;
            });

            // Kamera titrəməsi
            if (shakeIntensity > 0.02) {
                camera.position.x += (Math.random() - 0.5) * shakeIntensity;
                camera.position.y += (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= 0.9;
            } else {
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, 0.1);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, 0, 0.1);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            updateExplosion(time);

            // Sakit halda fırlatma
            if (!isExploded && !lastHandPos && saturn && rings) {
                saturn.rotation.y += 0.003;
                rings.rotation.z += 0.0015;
            }

            // Ulduzların yavaş fırlanması
            if (stars) stars.rotation.y += 0.00005;
            if (nebulaParticles) nebulaParticles.rotation.y -= 0.00003;

            // Saturn materialının rəngini zamanla bir az dəyişdir (canlılıq)
            if (saturn && saturn.material) {
                const hueShift = Math.sin(time * 0.3) * 0.02;
                const baseColor = new THREE.Color(0xffd700);
                baseColor.offsetHSL(hueShift, 0, Math.sin(time * 0.5) * 0.05);
                saturn.material.color.copy(baseColor);
            }

            renderer.render(scene, camera);
        }

        async function startApp() {
            initThree();

            const videoElement = document.getElementById('input-video');
            const loadingMsg = document.getElementById('loading-msg');
            const hintOverlay = document.getElementById('hint-overlay');

            // 5 saniyə sonra hint-i yox et
            setTimeout(() => {
                if (hintOverlay) hintOverlay.style.opacity = '0';
            }, 6000);

            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });

            const handConnections = [
                [0, 1], [1, 2], [2, 3], [3, 4],
                [0, 5], [5, 6], [6, 7], [7, 8],
                [0, 9], [9, 10], [10, 11], [11, 12],
                [0, 13], [13, 14], [14, 15], [15, 16],
                [0, 17], [17, 18], [18, 19], [19, 20],
                [5, 9], [9, 13], [13, 17]
            ];

            hands.onResults((results) => {
                if (loadingMsg) loadingMsg.style.display = 'none';

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const positions = [];
                    const linePositions = [];

                    currentHandCenter.set(
                        ((1 - landmarks[9].x) - 0.5) * 15,
                        -(landmarks[9].y - 0.5) * 10,
                        0
                    );

                    landmarks.forEach(lm => {
                        const x = ((1 - lm.x) - 0.5) * 15;
                        const y = -(lm.y - 0.5) * 10;
                        const z = 0;
                        positions.push(x, y, z);
                    });

                    handConnections.forEach(([start, end]) => {
                        linePositions.push(
                            positions[start * 3], positions[start * 3 + 1], positions[start * 3 + 2],
                            positions[end * 3], positions[end * 3 + 1], positions[end * 3 + 2]
                        );
                    });

                    if (handPoints) handPoints.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    if (handSkeleton) handSkeleton.geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));

                    const isFist = isHandFist(landmarks);
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];

                    // Yaxınlaşdır/uzaqlaşdır
                    const zoomDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                    const targetZ = 35 - (zoomDist * 110);
                    camera.position.z = THREE.MathUtils.lerp(camera.position.z, Math.max(5, Math.min(targetZ, 60)), 0.1);

                    if (isFist) {
                        // Əvvəl partladılmışdısa → yığılma zamanı təsir
                        if (isExploded) {
                            shakeIntensity = 0.15;
                        }
                        isExploded = false;
                        if (lastHandPos) {
                            const dx = (1 - indexTip.x) - (1 - lastHandPos.x);
                            const dy = indexTip.y - lastHandPos.y;
                            saturn.rotation.y += dx * 7;
                            saturn.rotation.x += dy * 7;
                            rings.rotation.y += dx * 7;
                            rings.rotation.x += dy * 7;
                        }
                        lastHandPos = indexTip;
                    } else {
                        // ƏL AÇIQ — Partlayış başladı
                        if (!isExploded) {
                            shakeIntensity = 0.3;
                        }
                        isExploded = true;
                        lastHandPos = null;
                    }
                    if (handGroup) handGroup.visible = true;
                } else {
                    if (handGroup) handGroup.visible = false;
                    lastHandPos = null;
                    isExploded = false;
                }
            });

            // Kamera başlatma
            if (typeof Camera !== 'undefined') {
                const cameraProvider = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 640, height: 480
                });
                cameraProvider.start();
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                    videoElement.srcObject = stream;
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        const processFrame = async () => {
                            await hands.send({ image: videoElement });
                            requestAnimationFrame(processFrame);
                        };
                        processFrame();
                    };
                } catch (err) {
                    if (loadingMsg) loadingMsg.innerText = "Xəta: Kameraya giriş mümkün deyil.";
                    if (loadingMsg) loadingMsg.style.color = "#ff4444";
                }
            }
        }

        window.onload = startApp;

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
