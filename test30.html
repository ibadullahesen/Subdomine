<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Fire Spark</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #video-hidden {
            display: none;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 60, 0, 0.3);
            border-top-color: #ff3c00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div id="canvas-container">
        <video id="video-hidden"></video>
        <canvas id="ui-canvas"></canvas>
        <canvas id="main-canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('video-hidden');
        const uiCanvas = document.getElementById('ui-canvas');
        const mainCanvas = document.getElementById('main-canvas');
        const uiCtx = uiCanvas.getContext('2d');
        const mainCtx = mainCanvas.getContext('2d');
        const loader = document.getElementById('loader');

        let particles = [];
        let completedStrokes = [];
        let currentStroke = [];
        let isDrawingLastFrame = false;

        class SparkParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.z = Math.random() * 20;
                
                // Daha realistik, xaotik partlayış sürəti
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 7 + 2; 
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force - 2; // Başlanğıcda bir az yuxarı sıçrayış
                this.vz = (Math.random() - 0.5) * 5;

                this.friction = 0.97; // Sürətin itməsi daha yavaş (daha təbii)
                this.gravity = 0.25;  // Qravitasiya daha güclü (metal qığılcımı kimi)
                this.life = 1.0;
                this.decay = 0.01 + Math.random() * 0.015; // Ömür bir az daha uzun
                
                // Realistik atəş rəngləri: parlaq ağ-sarıdan tünd qırmızıya
                this.hue = 15 + Math.random() * 25; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.z += this.vz;
                this.vy += this.gravity;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.life -= this.decay;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.globalAlpha = this.life;
                
                // Rəng həyatın sonuna doğru qırmızılaşır
                const brightness = this.life > 0.5 ? 90 : 50;
                const color = `hsl(${this.hue}, 100%, ${brightness}%)`;
                
                ctx.strokeStyle = color;
                ctx.lineWidth = this.life * 3;
                ctx.lineCap = "round";
                
                // Parıltı effekti (Glow)
                ctx.shadowBlur = this.life * 12;
                ctx.shadowColor = color;

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                // Quyruq hissəsi sürətə bağlıdır (Motion blur effekti)
                ctx.lineTo(this.x - this.vx * 0.8, this.y - this.vy * 0.8);
                ctx.stroke();
                ctx.restore();
            }
        }

        function checkGestures(landmarks) {
            const isDrawing = landmarks[8].y < landmarks[6].y && landmarks[12].y > landmarks[10].y;
            const isClearing = landmarks[4].y < landmarks[3].y && landmarks[8].y > landmarks[6].y;
            return { isDrawing, isClearing };
        }

        function processStrokes() {
            for (let s = completedStrokes.length - 1; s >= 0; s--) {
                const strokeObj = completedStrokes[s];
                
                // Yanma sürəti azaldıldı (daha yavaş fitil effekti)
                const pointsToProcess = Math.min(strokeObj.points.length, 2); 
                
                for (let i = 0; i < pointsToProcess; i++) {
                    const p = strokeObj.points.shift();
                    for (let j = 0; j < 5; j++) {
                        particles.push(new SparkParticle(p.x, p.y));
                    }
                }
                if (strokeObj.points.length === 0) completedStrokes.splice(s, 1);
            }
        }

        function onResults(results) {
            if (loader.style.display !== 'none') loader.style.display = 'none';

            if (uiCanvas.width !== window.innerWidth || uiCanvas.height !== window.innerHeight) {
                uiCanvas.width = mainCanvas.width = window.innerWidth;
                uiCanvas.height = mainCanvas.height = window.innerHeight;
            }

            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const gestures = checkGestures(landmarks);
                const indexTip = { x: landmarks[8].x * mainCanvas.width, y: landmarks[8].y * mainCanvas.height };

                if (gestures.isDrawing) {
                    currentStroke.push(indexTip);
                    // Közərən fitil (içərisi ağ, kənarı sarı)
                    drawStroke(mainCtx, currentStroke, "#fff6e0", "#ffaa00");
                    isDrawingLastFrame = true;
                    
                    if (Math.random() > 0.3) {
                        particles.push(new SparkParticle(indexTip.x, indexTip.y));
                    }
                } else {
                    if (isDrawingLastFrame && currentStroke.length > 0) {
                        completedStrokes.push({ points: [...currentStroke] });
                        currentStroke = [];
                    }
                    isDrawingLastFrame = false;
                }

                if (gestures.isClearing) {
                    particles = [];
                    completedStrokes = [];
                    currentStroke = [];
                }
                drawHand(landmarks, gestures.isDrawing);
            } else {
                if (isDrawingLastFrame && currentStroke.length > 0) {
                    completedStrokes.push({ points: [...currentStroke] });
                    currentStroke = [];
                }
                isDrawingLastFrame = false;
            }

            processStrokes();
            // Yanmaqda olan fitilin sönməkdə olan hissəsi
            completedStrokes.forEach(s => drawStroke(mainCtx, s.points, "rgba(255, 60, 0, 0.4)", "rgba(100, 20, 0, 0.3)"));
            
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(mainCtx); });
        }

        function drawStroke(ctx, points, color, glowColor) {
            if (points.length < 2) return;
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = glowColor || color;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.stroke();
            ctx.restore();
        }

        function drawHand(landmarks, isDrawing) {
            const color = isDrawing ? "rgba(255, 68, 0, 0.8)" : "rgba(255, 255, 255, 0.4)";
            uiCtx.save();
            drawConnectors(uiCtx, landmarks, HAND_CONNECTIONS, {color: color, lineWidth: 1});
            for (const landmark of landmarks) {
                uiCtx.beginPath();
                uiCtx.arc(landmark.x * uiCanvas.width, landmark.y * uiCanvas.height, 1, 0, 2 * Math.PI);
                uiCtx.fillStyle = color;
                uiCtx.fill();
            }
            uiCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280,
            height: 720
        });

        camera.start();

        window.addEventListener('resize', () => {
            uiCanvas.width = mainCanvas.width = window.innerWidth;
            uiCanvas.height = mainCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
