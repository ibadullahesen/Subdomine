<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Əl İzləmə Effekt</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Ayna effekti */
            z-index: 1;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            z-index: 3;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <div id="loading">Sistem yüklənir, zəhmət olmasa gözləyin...</div>
        <video id="input_video" autoplay playsinline></video>
        <canvas id="canvas_3d"></canvas>
    </div>

    <!-- MediaPipe və Three.js kitabxanaları -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('canvas_3d');
        const loadingDiv = document.getElementById('loading');

        // Three.js Ayarları
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // İşıqlandırma
        const mainLight = new THREE.DirectionalLight(0xffffff, 2);
        mainLight.position.set(5, 5, 10);
        scene.add(mainLight);
        
        const ambientLight = new THREE.AmbientLight(0x404040, 1);
        scene.add(ambientLight);

        // Kublar Şəbəkəsi Yaradılması
        const cubes = [];
        const gridSizeX = 18; 
        const gridSizeY = 12;
        const spacing = 1.1;

        const geometry = new THREE.BoxGeometry(0.85, 0.85, 0.85);

        for (let x = 0; x < gridSizeX; x++) {
            for (let y = 0; y < gridSizeY; y++) {
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    roughness: 0.1,
                    metalness: 0.9,
                    transparent: true, 
                    opacity: 0,
                    emissive: 0x0044ff,
                    emissiveIntensity: 0
                });
                
                const cube = new THREE.Mesh(geometry, material);
                
                cube.position.x = (x - gridSizeX / 2) * spacing;
                cube.position.y = (y - gridSizeY / 2) * spacing;
                cube.position.z = -6; 
                
                cube.originalZ = cube.position.z;
                scene.add(cube);
                cubes.push(cube);
            }
        }

        camera.position.z = 5;

        let handX = -100, handY = -100;
        let isFist = false;

        function onResults(results) {
            if (loadingDiv) loadingDiv.style.display = 'none';
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const wrist = landmarks[0];
                const tipIds = [8, 12, 16, 20];
                let totalDistance = 0;
                
                tipIds.forEach(id => {
                    const dx = landmarks[id].x - wrist.x;
                    const dy = landmarks[id].y - wrist.y;
                    totalDistance += Math.sqrt(dx * dx + dy * dy);
                });

                // Yumruq yoxlanışı
                isFist = totalDistance < 0.6; 

                handX = (1 - landmarks[8].x - 0.5) * 22; 
                handY = (0.5 - landmarks[8].y) * 16;
            } else {
                handX = -100; handY = -100;
                isFist = false;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        cameraUtils.start();

        function animate() {
            requestAnimationFrame(animate);

            cubes.forEach(cube => {
                if (!cube) return;
                
                const dx = cube.position.x - handX;
                const dy = cube.position.y - handY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Əsas məntiq:
                // 1. Əgər yumruqdursa: bütün kublar mavi rəngdə parlayır və görünür olur
                // 2. Əgər açıq əldirsə: kublar yalnız yaxınlaşanda üzə çıxır (əvvəlki effekt)

                if (isFist) {
                    // Yumruq rejimi: Hamısı mavi parlasın
                    cube.material.opacity += (0.8 - cube.material.opacity) * 0.1;
                    cube.material.emissiveIntensity = 2;
                    cube.material.color.setHex(0x00aaff);
                    
                    // Yumruq zamanı həm də ələ yaxın olanlar irəli çıxsın
                    if (distance < 3.5) {
                        const targetZ = cube.originalZ + (3.5 - distance) * 4;
                        cube.position.z += (targetZ - cube.position.z) * 0.1;
                    } else {
                        cube.position.z += (cube.originalZ - cube.position.z) * 0.1;
                    }
                } else {
                    // Normal rejim: Yalnız əl yaxınlaşanda üzə çıxsın
                    cube.material.emissiveIntensity = 0;
                    cube.material.color.setHex(0xffffff);

                    if (distance < 3) {
                        const targetZ = cube.originalZ + (3 - distance) * 4.5;
                        cube.position.z += (targetZ - cube.position.z) * 0.15;
                        
                        const targetOpacity = Math.min(0.7, (3 - distance) * 1.2);
                        cube.material.opacity += (targetOpacity - cube.material.opacity) * 0.1;
                        
                        cube.rotation.x += 0.05;
                        cube.rotation.y += 0.05;
                    } else {
                        cube.position.z += (cube.originalZ - cube.position.z) * 0.1;
                        cube.material.opacity += (0 - cube.material.opacity) * 0.1;
                        cube.rotation.x *= 0.9;
                        cube.rotation.y *= 0.9;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
